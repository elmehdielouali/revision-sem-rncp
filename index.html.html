<style>
  :root {
    --bg: #0F1117;
    --surface: #1A1D27;
    --surface2: #232636;
    --border: #2E3147;
    --text: #E8E9F0;
    --text-muted: #7C7F9A;
    --blue: #4F8EF7;
    --blue-light: #1A2E52;
    --teal: #2EC4A0;
    --teal-light: #0E2E28;
    --amber: #F5A623;
    --amber-light: #2E2010;
    --coral: #F06B6B;
    --coral-light: #2E1010;
    --purple: #9B7EF8;
    --purple-light: #1E1538;
    --green: #5BBF7A;
    --green-light: #102218;
    --center-bg: #4F8EF7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    user-select: none;
  }

  /* CANVAS */
  #canvas {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
    cursor: grab;
  }
  #canvas.dragging { cursor: grabbing; }

  #world {
    position: absolute;
    width: 2400px;
    height: 2000px;
    top: 0; left: 0;
    transform-origin: 0 0;
  }

  svg#lines {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* NODES */
  .node {
    position: absolute;
    border-radius: 14px;
    padding: 10px 16px;
    cursor: pointer;
    border: 1.5px solid;
    transition: transform 0.15s, box-shadow 0.15s;
    text-align: center;
    white-space: nowrap;
  }
  .node:hover { transform: scale(1.06); box-shadow: 0 0 20px rgba(79,142,247,0.25); }
  .node.center {
    background: var(--blue);
    border-color: #7AABFF;
    border-radius: 18px;
    padding: 16px 28px;
    box-shadow: 0 0 40px rgba(79,142,247,0.35);
  }
  .node.center .node-title { font-size: 20px; font-weight: 600; color: #fff; }
  .node.center .node-sub { font-size: 11px; color: rgba(255,255,255,0.75); margin-top: 2px; }
  .node-title { font-size: 13px; font-weight: 600; letter-spacing: 0.01em; }
  .node-sub { font-size: 10px; margin-top: 2px; opacity: 0.75; }

  .node.blue   { background: var(--blue-light);   border-color: var(--blue);   color: #A8CAFF; }
  .node.teal   { background: var(--teal-light);   border-color: var(--teal);   color: #7DECD3; }
  .node.amber  { background: var(--amber-light);  border-color: var(--amber);  color: #FFCC7A; }
  .node.coral  { background: var(--coral-light);  border-color: var(--coral);  color: #FFB0B0; }
  .node.purple { background: var(--purple-light); border-color: var(--purple); color: #D4C2FF; }
  .node.green  { background: var(--green-light);  border-color: var(--green);  color: #9FDFB5; }

  .node.child {
    border-radius: 10px;
    padding: 7px 13px;
    font-size: 11px;
    font-weight: 500;
  }

  /* PANEL */
  #panel {
    position: fixed;
    right: 0; top: 0;
    width: 380px;
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    padding: 28px 24px;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    z-index: 100;
  }
  #panel.open { transform: translateX(0); }

  #panel-close {
    position: absolute;
    top: 16px; right: 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  #panel-close:hover { background: var(--border); color: var(--text); }

  .panel-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  #panel-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.3;
  }
  #panel-formula {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--amber);
    margin: 12px 0;
    display: none;
  }
  #panel-body {
    font-size: 14px;
    color: #B0B3CC;
    line-height: 1.7;
    margin-bottom: 16px;
  }
  .panel-section {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .panel-section-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .panel-section p {
    font-size: 13px;
    color: #C0C4D8;
    line-height: 1.6;
  }
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .kpi-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
  }
  .kpi-name { font-size: 11px; font-weight: 600; color: var(--text-muted); }
  .kpi-formula { font-size: 11px; color: var(--amber); font-family: monospace; margin-top: 2px; }

  /* TOOLBAR */
  #toolbar {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 6px;
    z-index: 200;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .tb-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .tb-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--blue); }
  #tb-label { font-size: 11px; color: var(--text-muted); padding: 0 6px; }

  /* LEGEND */
  #legend {
    position: fixed;
    top: 20px;
    left: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    z-index: 200;
  }
  .leg-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 8px; }
  .leg-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 11px; color: var(--text-muted); }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; }

  /* BADGE */
  #badge {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 11px;
    color: var(--text-muted);
    z-index: 200;
  }
  #badge span { color: var(--blue); font-weight: 600; }
</style>
</head>

function getCenter(node) {
  const el = document.getElementById('n-' + (node.id || 'center'));
  if (!el) return { x: node.x, y: node.y };
  return { x: node.x + el.offsetWidth/2, y: node.y + el.offsetHeight/2 };
}

function makeLine(x1, y1, x2, y2, color) {
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', x1); line.setAttribute('y1', y1);
  line.setAttribute('x2', x2); line.setAttribute('y2', y2);
  line.setAttribute('stroke', color);
  line.setAttribute('stroke-width', '1.5');
  line.setAttribute('stroke-opacity', '0.45');
  line.setAttribute('stroke-dasharray', '4 3');
  svgLines.appendChild(line);
}

const colorMap = {
  blue:'#4F8EF7', teal:'#2EC4A0', amber:'#F5A623',
  coral:'#F06B6B', purple:'#9B7EF8', green:'#5BBF7A', center:'#4F8EF7'
};

// Center node
const cEl = document.createElement('div');
cEl.className = 'node center'; cEl.id = 'n-center';
cEl.style.left = cx + 'px'; cEl.style.top = cy + 'px';
cEl.innerHTML = `<div class="node-title">${DATA.center.label}</div><div class="node-sub">${DATA.center.sub}</div>`;
cEl.onclick = () => openPanel({
  id:'center', tag:'Centre', tagColor:'#1A2E52', tagText:'#4F8EF7',
  title:'SEM — Search Engine Marketing',
  body:'Le SEM regroupe toutes les techniques de référencement payant sur les moteurs de recherche. L\'outil principal est Google Ads. Contrairement au SEO (gratuit, long terme), le SEM offre une visibilité immédiate, en échange d\'un budget publicitaire.',
  formula:'Position annonce = f(Enchère × Quality Score × Contexte)',
  example:'Back Market investit en SEM pour capter les acheteurs au moment précis où ils cherchent un produit reconditionné. Résultat : présence immédiate en tête des résultats Google pour \'iPhone reconditionné\', \'Samsung reconditionné\', etc.',
  tip:'Le jury attend que tu différencies clairement SEM (payant, immédiat, Google Ads) de SEO (organique, long terme, optimisation site). Les deux sont complémentaires.'
});
world.appendChild(cEl);

// Branch nodes + children
DATA.nodes.forEach(node => {
  const el = document.createElement('div');
  el.className = `node ${node.color}`; el.id = `n-${node.id}`;
  el.style.left = node.x + 'px'; el.style.top = node.y + 'px';
  el.innerHTML = `<div class="node-title">${node.label}</div><div class="node-sub">${node.sub}</div>`;
  el.onclick = () => openPanel(node);
  world.appendChild(el);

  // Children
  if (node.children) {
    node.children.forEach(ch => {
      const cel = document.createElement('div');
      cel.className = `node child ${node.color}`;
      cel.style.left = ch.x + 'px'; cel.style.top = ch.y + 'px';
      cel.innerHTML = `<div class="node-title">${ch.label}</div><div class="node-sub">${ch.sub}</div>`;
      cel.onclick = () => openPanel(node);
      world.appendChild(cel);
    });
  }
});

// Draw lines after layout
setTimeout(() => {
  DATA.nodes.forEach(node => {
    const el = document.getElementById(`n-${node.id}`);
    const nw = el.offsetWidth, nh = el.offsetHeight;
    const nx = node.x + nw/2, ny = node.y + nh/2;
    const cnel = document.getElementById('n-center');
    const cnw = cnel.offsetWidth, cnh = cnel.offsetHeight;
    makeLine(nx, ny, cx + cnw/2, cy + cnh/2, colorMap[node.color]);

    if (node.children) {
      node.children.forEach(ch => {
        makeLine(ch.x + 60, ch.y + 15, nx, ny, colorMap[node.color]);
      });
    }
  });
}, 100);

// ---- PANEL ----
function openPanel(node) {
  document.getElementById('panel-tag').textContent = node.tag || 'SEM';
  document.getElementById('panel-tag').style.background = node.tagColor || '#1A2E52';
  document.getElementById('panel-tag').style.color = node.tagText || '#4F8EF7';
  document.getElementById('panel-title').textContent = node.title;
  document.getElementById('panel-body').textContent = node.body;

  const fEl = document.getElementById('panel-formula');
  if (node.formula) { fEl.textContent = node.formula; fEl.style.display = 'block'; }
  else { fEl.style.display = 'none'; }

  let extra = '';
  if (node.example) {
    extra += `<div class="panel-section">
      <div class="panel-section-title">Exemple Back Market</div>
      <p style="white-space:pre-line;font-family:monospace;font-size:12px">${node.example}</p>
    </div>`;
  }
  if (node.id === 'kpis') {
    extra += `<div class="panel-section">
      <div class="panel-section-title">Tableau des formules</div>
      <div class="kpi-grid">
        ${[['CTR','Clics/Imp×100'],['CPC','Budget/Clics'],['CPA','Budget/Conv.'],['ROAS','CA/Budget×100'],['CPM','Budget/Imp×1000'],['Tx Conv.','Conv./Clics×100']].map(([n,f])=>`
        <div class="kpi-item"><div class="kpi-name">${n}</div><div class="kpi-formula">${f}</div></div>`).join('')}
      </div>
    </div>`;
  }
  if (node.tip) {
    extra += `<div class="panel-section" style="border-color:#F5A623;background:#2E2010">
      <div class="panel-section-title" style="color:#F5A623">Astuce jury</div>
      <p style="color:#FFCC7A">${node.tip}</p>
    </div>`;
  }
  document.getElementById('panel-extra').innerHTML = extra;
  document.getElementById('panel').classList.add('open');
}
function closePanel() { document.getElementById('panel').classList.remove('open'); }

// ---- PAN & ZOOM ----
let scale = 0.55, tx = -300, ty = -200;
const canvas = document.getElementById('canvas');

function applyTransform() {
  world.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
}
applyTransform();

function zoom(factor) {
  scale = Math.min(2, Math.max(0.25, scale * factor));
  applyTransform();
}
function resetView() { scale = 0.55; tx = -300; ty = -200; applyTransform(); }

let drag = false, startX, startY, startTx, startTy;
canvas.addEventListener('mousedown', e => {
  if (e.target.closest('.node')) return;
  drag = true; canvas.classList.add('dragging');
  startX = e.clientX; startY = e.clientY; startTx = tx; startTy = ty;
});
window.addEventListener('mousemove', e => {
  if (!drag) return;
  tx = startTx + (e.clientX - startX);
  ty = startTy + (e.clientY - startY);
  applyTransform();
});
window.addEventListener('mouseup', () => { drag = false; canvas.classList.remove('dragging'); });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  zoom(e.deltaY < 0 ? 1.1 : 0.9);
}, { passive: false });

// Touch support
let lastDist = null;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    drag = true;
    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    startTx = tx; startTy = ty;
  }
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (lastDist) zoom(dist / lastDist);
    lastDist = dist;
  } else if (drag && e.touches.length === 1) {
    tx = startTx + (e.touches[0].clientX - startX);
    ty = startTy + (e.touches[0].clientY - startY);
    applyTransform();
  }
}, { passive: false });
canvas.addEventListener('touchend', () => { drag = false; lastDist = null; });
</script>
</body>
</html>
